<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">
<h2 class="text-center mb-4">📊 Student Data Dashboard</h2>

<!-- Search + Filters -->
<div class="row mb-3">
  <div class="col-md-3">
    <input type="text" id="searchBox" class="form-control" placeholder="Search by name or email">
  </div>

  <div class="col-md-3">
    <select id="departmentFilter" class="form-select">
      <option value="">All Departments</option>
      <option>CSE</option>
      <option>ECE</option>
      <option>EEE</option>
      <option>MECH</option>
      <option>CIVIL</option>
    </select>
  </div>

  <div class="col-md-3">
    <select id="sortOption" class="form-select">
      <option value="name">Sort by Name</option>
      <option value="date">Sort by Date</option>
    </select>
  </div>
</div>

<!-- Summary -->
<div class="row mb-3">
  <div class="col-md-6">
    <h5>Total Students: <span id="totalCount"></span></h5>
  </div>
</div>

<h5>Department Count</h5>
<ul id="deptCount"></ul>

<!-- Table -->
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Date Joined</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>
</div>

<script>
/* 📦 Expanded Student Data */
let students = [
  {name:"Arun", email:"arun@gmail.com", department:"CSE", date_joined:"2024-01-10"},
  {name:"Divya", email:"divya@gmail.com", department:"ECE", date_joined:"2023-12-12"},
  {name:"Kiran", email:"kiran@gmail.com", department:"CSE", date_joined:"2024-02-01"},
  {name:"Meena", email:"meena@gmail.com", department:"EEE", date_joined:"2023-11-21"},
  {name:"Ravi", email:"ravi@gmail.com", department:"MECH", date_joined:"2024-01-05"},
  {name:"Sneha", email:"sneha@gmail.com", department:"CIVIL", date_joined:"2023-10-15"},
  {name:"Vikram", email:"vikram@gmail.com", department:"CSE", date_joined:"2024-02-15"},
  {name:"Anjali", email:"anjali@gmail.com", department:"ECE", date_joined:"2023-09-18"},
  {name:"Rahul", email:"rahul@gmail.com", department:"EEE", date_joined:"2024-01-25"},
  {name:"Pooja", email:"pooja@gmail.com", department:"MECH", date_joined:"2023-12-01"},
  {name:"Karthik", email:"karthik@gmail.com", department:"CIVIL", date_joined:"2024-02-05"},
  {name:"Nisha", email:"nisha@gmail.com", department:"CSE", date_joined:"2023-11-30"}
];

/* 📊 Display Table */
function displayStudents(data) {
  const table = document.getElementById("studentTable");
  table.innerHTML = "";

  data.forEach(s => {
    table.innerHTML += `
      <tr>
        <td>${s.name}</td>
        <td>${s.email}</td>
        <td>${s.department}</td>
        <td>${s.date_joined}</td>
      </tr>
    `;
  });

  document.getElementById("totalCount").innerText = data.length;
}

/* 📊 Department Count */
function updateCount(data) {
  const count = {};
  data.forEach(s => {
    count[s.department] = (count[s.department] || 0) + 1;
  });

  const list = document.getElementById("deptCount");
  list.innerHTML = "";

  for (let dept in count) {
    list.innerHTML += `<li>${dept}: ${count[dept]}</li>`;
  }
}

/* 🔍 Filter + Sort + Search */
function filterData() {
  let filtered = [...students];

  const dept = document.getElementById("departmentFilter").value;
  const sort = document.getElementById("sortOption").value;
  const search = document.getElementById("searchBox").value.toLowerCase();

  if (dept) {
    filtered = filtered.filter(s => s.department === dept);
  }

  if (search) {
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(search) ||
      s.email.toLowerCase().includes(search)
    );
  }

  if (sort === "name") {
    filtered.sort((a, b) => a.name.localeCompare(b.name));
  } else {
    filtered.sort((a, b) => new Date(a.date_joined) - new Date(b.date_joined));
  }

  displayStudents(filtered);
  updateCount(filtered);
}

/* 🎯 Event Listeners */
document.getElementById("departmentFilter").addEventListener("change", filterData);
document.getElementById("sortOption").addEventListener("change", filterData);
document.getElementById("searchBox").addEventListener("keyup", filterData);

/* 🚀 Initial Load */
displayStudents(students);
updateCount(students);
</script>

</body>
</html>
