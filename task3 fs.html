<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#74ebd5,#9face6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    border-radius:20px;
}

.portal-links a{
    text-decoration:none;
    font-size:14px;
    display:block;
    margin:4px 0;
}
</style>
</head>

<body>

<div class="card shadow-lg p-4" style="width:400px;">
    <h3 class="text-center mb-3">🎓 Student Portal Login</h3>

    <form action="dashboard.html" method="post">

        <!-- Email with Autofill -->
        <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required
                   autocomplete="email">
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   placeholder="Enter password"
                   required
                   autocomplete="current-password">
        </div>

        <!-- Remember me -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label">Remember me</label>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-primary w-100">Login</button>

    </form>

    <hr>

    <h6 class="text-center">Quick Access</h6>
    <div class="portal-links text-center">

        <a href="https://swayam.gov.in" target="_blank">SWAYAM</a>
        <a href="https://nptel.ac.in" target="_blank">NPTEL</a>
        <a href="https://www.coursera.org" target="_blank">Coursera</a>
        <a href="https://www.udemy.com" target="_blank">Udemy</a>
        <a href="https://www.geeksforgeeks.org" target="_blank">GeeksforGeeks</a>
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="https://www.hackerrank.com" target="_blank">HackerRank</a>

    </div>

</div>

</body>
</html>
