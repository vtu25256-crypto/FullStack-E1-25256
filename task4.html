<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Management Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.card { border-radius:15px; }
</style>
</head>

<body class="p-4">

<h2 class="text-center mb-4">🛒 Order Management Dashboard</h2>

<div class="container">

<!-- Filter -->
<div class="card p-3 shadow mb-3">
<div class="row">
<div class="col-md-4">
<select id="customerFilter" class="form-select">
<option value="All">Filter by Customer</option>
<option value="Raja">Raja</option>
<option value="Mohan">Mohan</option>
<option value="Anita">Anita</option>
</select>
</div>

<div class="col-md-4">
<button class="btn btn-primary" onclick="sortByAmount()">Sort by Amount</button>
<button class="btn btn-secondary" onclick="sortByDate()">Sort by Date</button>
</div>
</div>
</div>

<!-- Order Table -->
<div class="card p-3 shadow mb-4">
<h4>Customer Order History</h4>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Customer</th>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Date</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>

</div>

<!-- Summary Cards -->
<div class="row">

<div class="col-md-6">
<div class="card p-3 shadow">
<h5>🏆 Highest Value Order</h5>
<p id="highestOrder"></p>
</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow">
<h5>👑 Most Active Customer</h5>
<p id="activeCustomer"></p>
</div>
</div>

</div>

</div>

<script>
let orders = [
{customer:"Raja", product:"Laptop", qty:1, price:60000, date:"2025-01-10"},
{customer:"Raja", product:"Headphones", qty:2, price:2000, date:"2025-01-15"},
{customer:"Mohan", product:"Mobile", qty:1, price:20000, date:"2025-01-20"},
{customer:"Anita", product:"Headphones", qty:3, price:2000, date:"2025-01-25"},
{customer:"Raja", product:"Mobile", qty:1, price:20000, date:"2025-02-01"}
];

function renderTable(data){
const table = document.getElementById("orderTable");
table.innerHTML="";

data.forEach(o=>{
let total = o.qty * o.price;
table.innerHTML += `
<tr>
<td>${o.customer}</td>
<td>${o.product}</td>
<td>${o.qty}</td>
<td>${o.price}</td>
<td>${total}</td>
<td>${o.date}</td>
</tr>`;
});
}

function calculateHighestOrder(){
let highest = orders.reduce((max,o)=>{
let total = o.qty * o.price;
return total > max.total ? {name:o.customer,total} : max;
},{name:"",total:0});

document.getElementById("highestOrder").innerHTML =
`Customer: <b>${highest.name}</b><br>Amount: <b>₹${highest.total}</b>`;
}

function calculateMostActive(){
let count = {};

orders.forEach(o=>{
count[o.customer] = (count[o.customer] || 0) + 1;
});

let active = Object.keys(count).reduce((a,b)=> count[a] > count[b] ? a : b);

document.getElementById("activeCustomer").innerHTML =
`Name: <b>${active}</b><br>Total Orders: <b>${count[active]}</b>`;
}

function sortByAmount(){
orders.sort((a,b)=> (b.qty*b.price) - (a.qty*a.price));
renderTable(orders);
}

function sortByDate(){
orders.sort((a,b)=> new Date(b.date) - new Date(a.date));
renderTable(orders);
}

document.getElementById("customerFilter").addEventListener("change",function(){
let value = this.value;
if(value === "All") renderTable(orders);
else renderTable(orders.filter(o=>o.customer === value));
});

renderTable(orders);
calculateHighestOrder();
calculateMostActive();
</script>

</body>
</html>
