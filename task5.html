<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Payment Simulator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#eef2f7; }
.card { border-radius:15px; }
.success { color:green; }
.fail { color:red; }
</style>
</head>

<body class="p-4">

<h2 class="text-center mb-4">🏦 Advanced Payment Transaction Simulator</h2>

<div class="container">

<!-- Account Selection -->
<div class="card p-3 shadow mb-3">
<div class="row">

<div class="col-md-4">
<label>Sender</label>
<select id="sender" class="form-select"></select>
</div>

<div class="col-md-4">
<label>Receiver</label>
<select id="receiver" class="form-select"></select>
</div>

<div class="col-md-4">
<label>Amount</label>
<input type="number" id="amount" class="form-control" placeholder="Enter amount">
</div>

</div>

<div class="mt-3">
<button class="btn btn-success" onclick="processPayment()">Pay Now</button>
<button class="btn btn-danger" onclick="simulateFailure()">Simulate Failure</button>
</div>
</div>

<!-- Account Balances -->
<div class="card p-3 shadow mb-3">
<h5>💰 Account Balances</h5>
<ul id="balanceList"></ul>
</div>

<!-- Transaction Log -->
<div class="card p-3 shadow">
<h5>📜 Transaction History</h5>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Time</th>
<th>From</th>
<th>To</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody id="txnTable"></tbody>
</table>
</div>

</div>

<script>
let accounts = [
{name:"Raja", balance:5000},
{name:"Mohan", balance:7000},
{name:"Anita", balance:9000},
{name:"TechStore", balance:15000}
];

function populateDropdowns(){
const sender = document.getElementById("sender");
const receiver = document.getElementById("receiver");

accounts.forEach((acc,i)=>{
sender.innerHTML += `<option value="${i}">${acc.name}</option>`;
receiver.innerHTML += `<option value="${i}">${acc.name}</option>`;
});
}

function updateBalances(){
const list = document.getElementById("balanceList");
list.innerHTML="";
accounts.forEach(acc=>{
list.innerHTML += `<li>${acc.name}: ₹${acc.balance}</li>`;
});
}

function addTransaction(from,to,amount,status){
const table = document.getElementById("txnTable");
const time = new Date().toLocaleTimeString();

table.innerHTML += `
<tr>
<td>${time}</td>
<td>${from}</td>
<td>${to}</td>
<td>₹${amount}</td>
<td class="${status==='SUCCESS'?'success':'fail'}">${status}</td>
</tr>`;
}

function processPayment(){
const senderIndex = document.getElementById("sender").value;
const receiverIndex = document.getElementById("receiver").value;
const amount = parseInt(document.getElementById("amount").value);

if(senderIndex === receiverIndex){
alert("Sender and Receiver cannot be same");
return;
}

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

let sender = accounts[senderIndex];
let receiver = accounts[receiverIndex];

// BEGIN TRANSACTION
let tempSender = sender.balance;
let tempReceiver = receiver.balance;

if(tempSender >= amount){

tempSender -= amount;
tempReceiver += amount;

// COMMIT
sender.balance = tempSender;
receiver.balance = tempReceiver;

updateBalances();
addTransaction(sender.name, receiver.name, amount, "SUCCESS");

}else{
addTransaction(sender.name, receiver.name, amount, "FAILED");
alert("Insufficient balance → ROLLBACK");
}

document.getElementById("amount").value="";
}

function simulateFailure(){
const senderIndex = document.getElementById("sender").value;
const receiverIndex = document.getElementById("receiver").value;
const amount = parseInt(document.getElementById("amount").value);

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

let sender = accounts[senderIndex];
let receiver = accounts[receiverIndex];

// BEGIN TRANSACTION
let tempSender = sender.balance;
let tempReceiver = receiver.balance;

tempSender -= amount; // deducted but failure happens

// ❌ ROLLBACK (no commit)
addTransaction(sender.name, receiver.name, amount, "ROLLBACK");

document.getElementById("amount").value="";
}

populateDropdowns();
updateBalances();
</script>

</body>
</html>
