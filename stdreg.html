<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
}

.card{
border-radius:15px;
animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.website-card:hover{
transform:scale(1.05);
transition:0.3s;
}

.table-container{
max-height:350px;
overflow-y:auto;
}

.search-box{
animation:slideIn 1s ease-in-out;
}

@keyframes slideIn{
from{transform:translateX(-100%);}
to{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="container py-4">

<h2 class="text-center text-white mb-4">🎓 Student Registration & Learning Portal</h2>

<div class="row g-4">

<!-- Registration Form -->
<div class="col-lg-4">
<div class="card shadow p-3">
<h5 class="text-center mb-3">Register Student</h5>

<form id="studentForm">

<input type="text" id="name" class="form-control mb-2" placeholder="Full Name" required>

<input type="email" id="email" class="form-control mb-2" placeholder="Email" required>

<input type="date" id="dob" class="form-control mb-2" required>

<select id="gender" class="form-select mb-2" required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select id="department" class="form-select mb-2" required>
<option value="">Department</option>
<option>CSE</option>
<option>IT</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
</select>

<input type="text" id="year" class="form-control mb-2" placeholder="Year (1-4)" required>

<input type="text" id="roll" class="form-control mb-2" placeholder="Roll Number" required>

<input type="text" id="phone" class="form-control mb-2" pattern="[0-9]{10}" placeholder="10-digit Phone" required>

<input type="text" id="address" class="form-control mb-3" placeholder="Address" required>

<button type="submit" class="btn btn-primary w-100">Register</button>

</form>
</div>
</div>

<!-- Student Table -->
<div class="col-lg-5">
<div class="card shadow p-3">

<div class="d-flex justify-content-between mb-2">
<h5>Student Records</h5>
<input type="text" id="searchInput"
class="form-control w-50 search-box"
placeholder="🔍 Search">
</div>

<div class="table-container">
<table class="table table-hover" id="studentTable">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Dept</th>
<th>Year</th>
<th>Roll</th>
<th>Phone</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>
</div>

<!-- Learning Websites -->
<div class="col-lg-3">
<div class="card shadow p-3">
<h5 class="text-center mb-3">📚 Learning Websites</h5>

<div class="row g-2">

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://swayam.gov.in" target="_blank">SWAYAM</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://nptel.ac.in" target="_blank">NPTEL</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://www.aicte-india.org" target="_blank">AICTE</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://ndl.iitkgp.ac.in" target="_blank">NDLI</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://spoken-tutorial.org" target="_blank">Spoken Tutorial</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://www.coursera.org" target="_blank">Coursera</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://www.edx.org" target="_blank">edX</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://www.khanacademy.org" target="_blank">Khan Academy</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://www.geeksforgeeks.org" target="_blank">GeeksforGeeks</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://www.w3schools.com" target="_blank">W3Schools</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://developer.mozilla.org" target="_blank">MDN Web Docs</a></div></div>

<div class="col-12"><div class="card website-card p-2 text-center"><a href="https://code.org" target="_blank">Code.org</a></div></div>

</div>
</div>
</div>

</div>
</div>

<script>
let id = 1;

document.getElementById("studentForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let dept = document.getElementById("department").value;
let year = document.getElementById("year").value;
let roll = document.getElementById("roll").value;
let phone = document.getElementById("phone").value;

let row = `<tr>
<td>${id++}</td>
<td>${name}</td>
<td>${dept}</td>
<td>${year}</td>
<td>${roll}</td>
<td>${phone}</td>
</tr>`;

document.getElementById("tableBody").innerHTML += row;

this.reset();
});

document.getElementById("searchInput").addEventListener("keyup", function(){
let filter = this.value.toLowerCase();
let rows = document.querySelectorAll("#studentTable tbody tr");

rows.forEach(row=>{
let text = row.innerText.toLowerCase();
row.style.display = text.includes(filter) ? "" : "none";
});
});
</script>

</body>
</html>
